name: Build and Publish Docker image (CUDA 12 Only)

on:
  workflow_dispatch: # 允许你在 GitHub 页面手动点击运行

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  packages: write
  contents: read

jobs:
  build-push-cuda12:
    name: Build and Push CUDA 12
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # 保留官方定义的三大核心 Target 镜像目标
        target: [server]

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          # 100% 沿用官方原版的 bash 小写转换语法，防止大写用户名报错
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER@L}"
          REPO_NAME="${{ github.event.repository.name }}"
          IMAGE_REPO="ghcr.io/${REPO_OWNER}/${REPO_NAME}"
          
          echo "image_repo=${IMAGE_REPO}" >> $GITHUB_OUTPUT

      # 核心保留：官方特有的清理磁盘空间步骤。
      # 编译 CUDA 耗氧量极高，不清理会直接把 GitHub 分配的虚拟盘撑爆
      - name: Free Disk Space (Ubuntu)
        uses: ggml-org/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devops/cuda.Dockerfile # 锁定官方的 CUDA Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64        # 聚焦于常规的 Linux x86_64 服务器环境
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ matrix.target }}-cuda12
            ${{ steps.meta.outputs.image_repo }}:${{ matrix.target }}-cuda
          build-args: |
            CUDA_VERSION=12.8.1
          # 引入 GitHub Actions 原生缓存，二次编译时速度会起飞
          cache-from: type=gha
          cache-to: type=gha,mode=max
